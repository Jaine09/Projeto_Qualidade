<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/paginaInicial.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"/>
</head>
<body>
<div class="intro-to-journal">
    <div class="rectangle-parent">
        <button class="frame-wrapper">
            <div class="abertura-da-porta-aberta-1-parent">
                <img class="abertura-da-porta-aberta-1-icon" alt="" src="./public/abertura-da-porta-aberta-1@2x.png" />
                <div class="sair-wrapper">
                    <b class="sair">Sair</b>
                </div>
            </div>
        </button>
        <h2 class="minha-biblioteca">Minha Biblioteca</h2>
    </div>

    <section class="intro-to-journal-inner">
        <div class="frame-parent">
            <div class="frame-group">
                <div class="rounded-rectangle-parent">
                    <input class="buscar" placeholder="Buscar" type="text" />
                    <img class="search-icon" alt="" src="/img/buscar.png" />
                </div>
                <div class="frame-container">
                    <button class="rectangle-group">
                        <b class="novo">Novo</b>
                    </button>
                </div>
            </div>

            <div class="rectangle-container">
                <div class="frame-div">
                    <img class="add-image-icon" alt="" src="./public/Add-Image@2x.png" />
                    <div class="ttulo-parent">
                        <b class="ttulo">Título</b>
                        <div class="gnero">Gênero</div>
                    </div>
                    <div class="actions-icons">
                        <img class="action-icon" alt="" src="/img/editar.png" />
                        <img class="action-icon" alt="" src="/img/excluir.png" />
                    </div>
                </div>

                <div class="custom-scrollbar"></div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
