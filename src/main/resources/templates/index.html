<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />

    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/login.css" />
</head>
<body>
<div class="screen">
    <div class="login-container">
        <div class="form-container">
            <div class="form-container-child"></div>
            <div class="fields-container">
                <h2 class="faa-seu-login">Faça seu login</h2>
            </div>
            <div class="email-container">
                <input
                        class="email-label-container"
                        placeholder="E-mail"
                        type="text"
                />

                <div class="password-container">
                    <input
                            class="email-label-container"
                            placeholder="Senha"
                            type="text"
                    />

                    <div class="forgotten-password-container">
                        <div class="forgotten-container">
                            <div class="esqueceu-a-senha">Esqueceu a senha?</div>
                            <div class="login-button-container">
                                <button class="button-container">
                                    <div class="button-container-child"></div>
                                    <div class="entrar">Entrar</div>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="register-container">
                <div class="j-posssui-cadastro-container">
                    <span>Já posssui cadastro? </span>
                    <span class="cadastre-se-aqui">Cadastre-se aqui</span>
                </div>
            </div>
        </div>
    </div>
    <img
            class="books-with-flipping-pages-1-icon"
            loading="lazy"
            alt=""
            src="/img/imgLogin.jpg"
    />
</div>
</body>
</html>
