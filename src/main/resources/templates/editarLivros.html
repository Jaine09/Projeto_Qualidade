<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/editarLivros.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" />
</head>
<body>
<div class="root">
    <div class="rectangle-parent">
        <button class="go-back-button">
            <img class="go-back-icon" alt="Voltar" src="/img/voltar.png" />
        </button>
        <h3 class="editar-livro">Editar livro</h3>
    </div>

    <section class="root-inner">
        <div class="rectangle-group">
            <div class="form-content">
                <div class="top-inputs">
                    <div class="image-upload-placeholder">
                        <img class="add-image-icon" alt="Adicionar Imagem" src="/img/adicionarImagem.png" />
                    </div>

                    <div class="author-genre-fields">
                        <div class="field-group">
                            <label class="label-text">Autor</label>
                            <input class="input-field" type="text" />
                        </div>
                        <div class="field-group">
                            <label class="label-text">Gênero</label>
                            <div class="select-field">
                                <img class="chevron-icon" alt="" src="./public/Chevron-Left@2x.png" />
                            </div>
                        </div>
                    </div>
                </div>

                <div class="description-section">
                    <label class="label-text">Descrição</label>
                    <input class="description-input" type="text" />
                </div>
            </div>

            <div class="button-wrapper">
                <button class="save-button">
                    <span class="salvar">Salvar</span>
                </button>
            </div>
        </div>
    </section>
</div>
</body>
</html>
