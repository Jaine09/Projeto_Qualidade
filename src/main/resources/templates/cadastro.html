<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />

    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/cadastro.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"/>
</head>
<body>
<div class="landing-page">
    <img class="view-books-arrangement-1-icon" alt="" src="/img/imgFundo.webp"/>

    <div class="rectangle-parent">
        <div class="frame-child"></div>
        <div class="faa-seu-cadastro-wrapper">
            <h2 class="faa-seu-cadastro">Faça seu cadastro</h2>
        </div>
        <div class="form">
            <input class="fields" placeholder="Nome" type="text" />

            <input class="fields" placeholder="E-mail" type="text" />

            <input class="fields" placeholder="Senha" type="text" />

            <input class="fields" placeholder="Confirmar senha" type="text" />
        </div>
        <div class="control">
            <button class="action">
                <div class="action-child"></div>
                <div class="entrar2">Entrar</div>
            </button>
        </div>
    </div>
</div>
</body>
</html>
