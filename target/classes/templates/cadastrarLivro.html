<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />
    <link rel="stylesheet" th:href="@{/css/global.css}" />
    <link rel="stylesheet" th:href="@{/css/cadastrarLivro.css}" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" />
</head>
<body>
<div class="tabbarcontainer">
    <div class="screen">
        <a th:href="@{/home}" class="go-back-button">
            <img class="go-back-icon" alt="Voltar" th:src="@{/img/voltar.png}" />
        </a>
        <h3 class="cadastrar-livro">Cadastrar livro</h3>
    </div>

    <form th:action="@{/salvar}" th:object="${livro}" method="post">
        <section class="book-details">
            <div class="rectangle-parent">
                <div class="form-content">
                    <div class="top-section">
                        <div class="rectangle-group">
                            <img class="add-image-icon" alt="" th:src="@{/img/adicionarImagem.png}" />
                        </div>

                        <div class="author-field-parent">
                            <div class="field-group">
                                <label class="label-text">Título</label>
                                <input class="author-input" type="text" th:field="*{titulo}" required />
                            </div>
                            <div class="field-group">
                                <label class="label-text">Autor</label>
                                <input class="author-input" type="text" th:field="*{autor}" />
                            </div>
                            <div class="field-group">
                                <label class="label-text">Gênero</label>
                                <input class="author-input" type="text" th:field="*{genero}" />
                            </div>
                        </div>
                    </div>

                    <div class="description-section">
                        <label class="label-text">Descrição</label>
                        <input class="description-input" type="text" th:field="*{descricao}" />
                    </div>
                </div>

                <div class="action-buttons">
                    <button type="submit" class="rectangle-container">
                        <span class="salvar">Salvar</span>
                    </button>
                </div>
            </div>
        </section>
    </form>
</div>
</body>
</html>
